  <style>
    /* Base Reset */
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Hero Section */
    .hero-container {
      width: 100%;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-bottom: 4px solid #dc3545;
    }

    /* Option Cards */
    .option-card {
      border: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 15px;
    }

    .option-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .option-card img {
      height: 220px;
      object-fit: cover; 
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    } 

    .option-card .card-title {
      font-size: 1.2rem;
      color: #343a40;
      margin-top: 10px;
    }

    /* Navbar Brand */
    .navbar-brand {
      font-weight: bold;
      font-size: 1.2rem;
    }
     .navbar-brand2 {
      font-weight: bold;
      font-size: 1.2rem;
      margin-left: auto;
    }
  </style>
