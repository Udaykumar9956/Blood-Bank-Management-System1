<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #ff2e4d, #ff577f, #ff1e3c, #ff6f91);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            position: relative;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 25px rgba(255,255,255,0.6);
            animation: float 8s ease-in-out infinite;
        }

        .circle:nth-child(1) {
            width: 140px;
            height: 140px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 8%;
            right: 10%;
            animation-delay: 2s;
        }

        .circle:nth-child(3) {
            width: 110px;
            height: 110px;
            top: 50%;
            right: 35%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-35px) translateX(25px); }
        }
        .login-box {
            width: 360px;
            background: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0px 12px 35px rgba(0,0,0,0.35);
            position: relative;
            z-index: 10;
            animation: fadeUp 0.7s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 {
            text-align: center;
            color: #b00020;
            font-weight: bold;
            margin-bottom: 20px;
        }

        label {
            color: #b00020;
            font-weight: bold;
        }

        .form-control {
            background: #ffe6ea;
            border: 1px solid #ffb3c2;
            color: #b00020;
            border-radius: 8px;
        }

        .form-control:focus {
            background: #fff0f4;
            border-color: #d1002c;
            box-shadow: 0 0 6px rgba(255, 0, 50, 0.4);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b00020;
            cursor: pointer;
        }

        .btn-login {
            background: #b00020;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            height: 44px;
        }

        .btn-login:hover {
            background: #d1002c;
        }

        .register-link {
            text-align: center;
            margin-top: 12px;
        }

        .register-link a {
            color: #b00020;
            font-weight: bold;
        }

        .alert {
            border-radius: 8px;
        }

    </style>
</head>

<body>
 <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="login-box">

        <h2>Login</h2>
        {% with messages = get_flashed_messages(with_categories=True) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="close" data-dismiss="alert">
                    <span>&times;</span>
                </button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/checkuser" method="POST">

            <label>Username</label>
            <input type="text" name="username" class="form-control mb-3" required>

            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="password" class="form-control mb-3" required>
                <i class="fa-solid fa-eye" id="toggleEye"></i>
            </div>

            <button class="btn btn-login btn-block">Login</button>
        </form>

        <div class="register-link">
            <a href="/register">New user? Register</a>
        </div>

    </div>
    <script>
        const eye = document.getElementById("toggleEye");
        const pwd = document.getElementById("password");

        eye.addEventListener("click", () => {
            if (pwd.type === "password") {
                pwd.type = "text";
                eye.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                pwd.type = "password";
                eye.classList.replace("fa-eye-slash", "fa-eye");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
